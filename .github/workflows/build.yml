name: Build iOS Tweak

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang llvm make automake autoconf libtool \
            curl git perl unzip xz-utils cpio \
            dpkg-dev libxml2-dev

      - name: Clone Theos
        run: |
          git clone --depth 1 https://github.com/theos/theos.git /tmp/theos

      - name: Download iOS SDK
        run: |
          cd /tmp/theos/sdks
          curl -fSL --connect-timeout 60 --max-time 600 \
            -o sdk.tar.xz \
            "https://github.com/senyunice/theos-sdks/releases/download/main/iPhoneOS16.6.sdk.tar.xz" \
            || curl -fSL --connect-timeout 60 --max-time 600 \
            -o sdk.tar.xz \
            "https://github.com/theos/sdks/releases/download/v2.0.0-2/iPhoneOS16.6.sdk.tar.xz" \
            || curl -fSL --connect-timeout 60 --max-time 600 \
            -o sdk.tar.xz \
            "https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz"
          ls -lh sdk.tar.xz || echo "SDK download failed"

      - name: Extract SDK
        run: |
          cd /tmp/theos/sdks
          if [ -f sdk.tar.xz ]; then
            tar xf sdk.tar.xz && rm sdk.tar.xz
          fi
          ls -la /tmp/theos/sdks/

      - name: Build tweak
        env:
          THEOS: /tmp/theos
        run: |
          export THEOS=/tmp/theos
          export PATH=$THEOS/bin:$PATH
          cd ${{ github.workspace }}
          make package THEOS=/tmp/theos ARCHS=arm64 TARGET=iphone:clang:latest:14.0 FINALPACKAGE=1 2>&1 || make package THEOS=/tmp/theos ARCHS=arm64 TARGET=iphone:clang:latest:14.0 2>&1

      - name: Check output
        run: |
          ls -la packages/ 2>/dev/null || echo "No packages dir"
          find . -name "*.deb" -type f 2>/dev/null

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: WiFiAutoShortcutLauncher-deb
          path: packages/*.deb
          retention-days: 30
