name: Build iOS Tweak

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang llvm make automake autoconf libtool \
            curl git perl unzip xz-utils cpio \
            python3-dev python3-pip

      - name: Clone Theos
        run: |
          git clone --depth 1 https://github.com/theos/theos.git $HOME/theos

      - name: Install iOS SDK
        run: |
          cd $HOME/theos/sdks
          curl -Ls https://github.com/theos/sdks/releases/download/master-20250427/iPhoneOS16.6.sdk.tar.xz -o iPhoneOS.sdk.tar.xz
          tar -xf iPhoneOS.sdk.tar.xz
          rm iPhoneOS.sdk.tar.xz

      - name: Build tweak
        env:
          THEOS: $HOME/theos
          PATH: $HOME/theos/bin:$PATH
        run: |
          export THEOS=$HOME/theos
          export PATH=$HOME/theos/bin:$PATH
          cd ${{ github.workspace }}
          make package THEOS_DEVICE_IP=localhost THEOS_DEVICE_PORT=2222 \
            ARCHS=arm64 TARGET=iphone:clang:latest:14.0 \
            FINALPACKAGE=1 2>&1 | tail -30
          ls -la packages/ 2>/dev/null || echo "Checking for debs..."
          find . -name "*.deb" -type f 2>/dev/null

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: WiFiAutoShortcutLauncher-${{ github.sha }}-arm64.deb
          path: packages/*.deb
          retention-days: 30

      - name: Create Release Draft
        if: github.event_name == 'push'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: latest
          release_name: WiFiAutoShortcutLauncher Latest Build
          draft: true
          prerelease: false

      - name: Upload to Release
        if: github.event_name == 'push'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: packages/*.deb
          asset_name: WiFiAutoShortcutLauncher.deb
          asset_content_type: application/x-deb
