name: Build iOS Tweak

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang llvm make automake autoconf libtool \
            curl git perl unzip xz-utils cpio

      - name: Clone Theos
        run: |
          git clone --depth 1 https://github.com/theos/theos.git $HOME/theos

      - name: Install iOS SDK
        run: |
          cd $HOME/theos/sdks
          curl -Ls https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz -o iPhoneOS.sdk.tar.xz
          tar -xf iPhoneOS.sdk.tar.xz
          rm iPhoneOS.sdk.tar.xz

      - name: Build tweak
        env:
          THEOS: $HOME/theos
          PATH: $HOME/theos/bin:$PATH
        run: |
          export THEOS=$HOME/theos
          export PATH=$HOME/theos/bin:$PATH
          cd ${{ github.workspace }}
          make package \
            ARCHS=arm64 \
            TARGET=iphone:clang:latest:14.0 \
            FINALPACKAGE=1 2>&1 | tail -40
          echo "---"
          echo "Looking for .deb files:"
          find . -name "*.deb" -type f 2>/dev/null
          ls -la packages/ 2>/dev/null || echo "No packages dir"

      - name: Upload .deb artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: WiFiAutoShortcutLauncher-deb
          path: packages/*.deb
          retention-days: 30
