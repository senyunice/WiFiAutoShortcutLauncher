name: Build iOS Tweak

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang llvm make automake autoconf libtool \
            curl git perl unzip xz-utils cpio \
            libncurses-dev python3 uuid-dev libbz2-dev

      - name: Clone Theos
        run: |
          git clone --depth 1 https://github.com/theos/theos.git $HOME/theos

      - name: Install iOS SDK
        run: |
          cd $HOME/theos/sdks
          curl -Ls https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz | tar xf -
          ls -la

      - name: Build tweak
        env:
          THEOS: $HOME/theos
          PATH: $HOME/theos/bin:$PATH
        run: |
          export THEOS=$HOME/theos
          export PATH=$HOME/theos/bin:$PATH
          cd ${{ github.workspace }}
          make package ARCHS=arm64 TARGET=iphone:clang:latest:14.0 FINALPACKAGE=1 2>&1
          ls -la packages/ 2>/dev/null || echo "No packages dir"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WiFiAutoShortcutLauncher-deb
          path: packages/*.deb
          retention-days: 30
