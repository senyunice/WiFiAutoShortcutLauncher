name: Build iOS Tweak

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang llvm make automake autoconf libtool \
            curl git perl unzip xz-utils cpio \
            dpkg-dev libxml2-dev

      - name: Clone Theos
        run: |
          git clone --depth 1 https://github.com/theos/theos.git /tmp/theos

      - name: Install iOS SDK
        run: |
          cd /tmp/theos/sdks
          curl -Ls https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz | tar xf -
          ls /tmp/theos/sdks/

      - name: Build tweak
        env:
          THEOS: /tmp/theos
        run: |
          cd ${{ github.workspace }}
          /tmp/theos/bin/dm.pl --help > /dev/null 2>&1 && echo "dm.pl OK" || echo "dm.pl FAIL"
          perl --version > /dev/null 2>&1 && echo "perl OK" || echo "perl FAIL"
          make package THEOS=/tmp/theos ARCHS=arm64 TARGET=iphone:clang:latest:14.0 FINALPACKAGE=1 2>&1
          echo "---Build done---"
          find . -name "*.deb" -type f

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: WiFiAutoShortcutLauncher-deb
          path: packages/*.deb
          retention-days: 30
