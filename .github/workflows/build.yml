name: Build iOS Tweak

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang llvm make automake autoconf libtool \
            curl git perl unzip xz-utils cpio \
            dpkg-dev libxml2-dev

      - name: Clone Theos
        run: |
          git clone --depth 1 https://github.com/theos/theos.git $HOME/theos

      - name: Download and extract iOS SDK
        run: |
          cd $HOME/theos/sdks
          echo "Downloading iOS SDK..."
          curl -L --retry 3 --retry-delay 5 \
            -o iPhoneOS.sdk.tar.xz \
            https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz
          echo "Download complete, size: $(du -h iPhoneOS.sdk.tar.xz)"
          echo "Extracting..."
          tar -xf iPhoneOS.sdk.tar.xz && rm iPhoneOS.sdk.tar.xz
          echo "Extract complete"
          ls -la $HOME/theos/sdks/

      - name: Build tweak
        env:
          THEOS: $HOME/theos
          PATH: $HOME/theos/bin:/usr/bin:/bin:$PATH
        run: |
          export THEOS=$HOME/theos
          export PATH=$HOME/theos/bin:/usr/bin:/bin:$PATH
          echo "=== Environment ==="
          echo "THEOS=$THEOS"
          echo "PATH=$PATH"
          echo "which make: $(which make)"
          echo "which clang: $(which clang)"
          echo "which dpkg-deb: $(which dpkg-deb)"
          echo "ls theos/bin:"
          ls $THEOS/bin/
          echo "=== Building ==="
          cd ${{ github.workspace }}
          make package ARCHS=arm64 TARGET=iphone:clang:latest:14.0 FINALPACKAGE=1 THEOS_DEVICE_IP= 2>&1
          echo "---Build done---"
          find . -name "*.deb" -type f 2>/dev/null

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WiFiAutoShortcutLauncher-deb
          path: packages/*.deb
          retention-days: 30
