name: Build iOS Tweak

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang llvm make automake autoconf libtool \
            curl git perl unzip xz-utils cpio \
            dpkg-dev libxml2-dev

      - name: Clone Theos
        run: |
          git clone --depth 1 https://github.com/theos/theos.git /tmp/theos

      - name: Download and install iOS SDK
        run: |
          cd /tmp/theos/sdks
          curl -L --connect-timeout 30 --max-time 600 \
            -o iPhoneOS.sdk.tar.xz \
            https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz
          tar xf iPhoneOS.sdk.tar.xz && rm iPhoneOS.sdk.tar.xz

      - name: Build tweak
        env:
          THEOS: /tmp/theos
          PATH: /tmp/theos/bin:/usr/local/bin:/usr/bin:/bin
        run: |
          echo "=== Environment ==="
          echo "THEOS=$THEOS"
          echo "PATH=$PATH"
          echo "=== Testing dm.pl ==="
          ls /tmp/theos/bin/dm.pl
          perl /tmp/theos/bin/dm.pl --version 2>&1 | head -3
          echo "which dm.pl: $(which dm.pl 2>&1 || echo 'not found')"
          echo "=== Files in workspace ==="
          ls -la
          echo "=== Running make ==="
          cd ${{ github.workspace }}
          make package THEOS=/tmp/theos ARCHS=arm64 TARGET=iphone:clang:latest:14.0 FINALPACKAGE=1 2>&1
          echo "=== Done ==="
          find . -name "*.deb" -type f

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: WiFiAutoShortcutLauncher-deb
          path: packages/*.deb
          retention-days: 30
