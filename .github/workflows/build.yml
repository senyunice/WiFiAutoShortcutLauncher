name: Build iOS Tweak

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang llvm make automake autoconf libtool \
            curl git perl unzip xz-utils cpio \
            dpkg-dev libxml2-dev

      - name: Clone Theos (full + submodules)
        run: |
          rm -rf /tmp/theos
          git clone --recurse-submodules https://github.com/theos/theos.git /tmp/theos

      - name: Verify Theos submodules
        run: |
          ls -la /tmp/theos/bin/dm.pl
          /usr/bin/perl /tmp/theos/bin/dm.pl --version 2>&1 | head -1 || echo "dm.pl not working"

      - name: Install iOS toolchain (Linux)
        run: |
          mkdir -p /tmp/theos/toolchain/linux/iphone/bin
          cd /tmp/theos/toolchain/linux/iphone/bin
          curl -fSL --connect-timeout 60 --max-time 600 \
            -o clang \
            https://github.com/L1ghtmann/llvm-project/releases/download/test-210562a/iOSToolchain-x86_64.tar.xz
          tar xf clang && rm clang
          ls /tmp/theos/toolchain/linux/iphone/bin/
          /tmp/theos/toolchain/linux/iphone/bin/clang --version 2>&1 | head -1 || echo "clang not found"

      - name: Download and install iOS SDK
        run: |
          cd /tmp/theos/sdks
          curl -fSL --connect-timeout 30 --max-time 600 \
            -o iPhoneOS.sdk.tar.xz \
            https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz \
            && tar xf iPhoneOS.sdk.tar.xz && rm iPhoneOS.sdk.tar.xz \
            || echo "SDK download/extract failed"
          ls /tmp/theos/sdks/

      - name: Build tweak
        env:
          THEOS: /tmp/theos
          PATH: /tmp/theos/bin:/usr/local/bin:/usr/bin:/bin
        run: |
          cd ${{ github.workspace }}
          ls -la
          make package THEOS=/tmp/theos ARCHS=arm64 TARGET=iphone:clang:latest:14.0 FINALPACKAGE=1 2>&1 | tee build.log
          echo "=== BUILD LOG ==="
          tail -100 build.log

      - name: Check output
        run: |
          find . -name "*.deb" -type f

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: WiFiAutoShortcutLauncher-deb
          path: packages/*.deb
          retention-days: 30
