name: Build iOS Tweak

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang llvm make automake autoconf libtool \
            curl git perl unzip xz-utils cpio

      - name: Clone Theos
        run: |
          git clone --depth 1 https://github.com/theos/theos.git $HOME/theos

      - name: Download and extract iOS SDK
        run: |
          cd $HOME/theos/sdks
          echo "Downloading iOS SDK..."
          curl -L --retry 3 --retry-delay 5 \
            -o iPhoneOS.sdk.tar.xz \
            https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz
          echo "Download complete, size: $(du -h iPhoneOS.sdk.tar.xz)"
          echo "Extracting..."
          tar -xf iPhoneOS.sdk.tar.xz && rm iPhoneOS.sdk.tar.xz
          echo "Extract complete"
          ls -la $HOME/theos/sdks/

      - name: Build tweak
        env:
          THEOS: $HOME/theos
          PATH: $HOME/theos/bin:$PATH
        run: |
          export THEOS=$HOME/theos
          export PATH=$HOME/theos/bin:$PATH
          cd ${{ github.workspace }}
          make package ARCHS=arm64 TARGET=iphone:clang:latest:14.0 FINALPACKAGE=1 2>&1
          echo "---Build done---"
          ls -la packages/ 2>/dev/null || echo "No packages dir"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WiFiAutoShortcutLauncher-deb
          path: packages/*.deb
          retention-days: 30
